<style>
:root{--g:#182016;--g2:#2b3a29;--gold:#b8973a;--bg:#f5f0e6;--card:#fff;--line:#e7dcc6;--txt:#1c1c1c;--muted:#6a6a6a;--bad:#b93b3b}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Montserrat,sans-serif;background:var(--bg);color:var(--txt)}button,input,select,textarea{font:inherit}a{color:inherit}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#243121,#10150f 70%)}.box{width:min(410px,100%);background:#fff;border:1px solid rgba(184,151,58,.25);border-radius:18px;padding:32px;box-shadow:0 24px 70px rgba(0,0,0,.2)}.mark{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:700}.title{font-family:'Playfair Display',serif;font-size:46px;line-height:.95;color:var(--g2);margin:10px 0}.sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:22px}
.field{margin-bottom:14px}.field label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px}.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff}.field textarea{min-height:84px;resize:vertical}
.btn{border:none;border-radius:10px;padding:11px 14px;cursor:pointer}.primary{background:var(--g);color:#e7cf86;font-weight:700}.secondary{background:#fff;border:1px solid var(--line)}.danger{background:var(--bad);color:#fff}.soft{background:#efe5d1}.error{min-height:18px;color:var(--bad);font-size:13px;margin-top:10px}

.nav{display:grid;gap:4px;padding:16px 0}.nav button{background:none;border:none;text-align:left;color:rgba(255,255,255,.58);padding:12px 20px;border-left:3px solid transparent;cursor:pointer;font-size:13px;font-weight:600}.nav button.on,.nav button:hover{color:#e7cf86;background:rgba(184,151,58,.08);border-left-color:var(--gold)}.foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(184,151,58,.14);font-size:12px;color:rgba(255,255,255,.6)}
.main{margin-left:230px;min-height:100vh}.top{position:sticky;top:0;background:rgba(245,240,230,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:18px 24px;display:flex;justify-content:space-between;gap:16px;align-items:center}.top h1{font-family:'Playfair Display',serif;font-size:30px;color:var(--g2)}.top p{font-size:13px;color:var(--muted);margin-top:3px}.actions{display:flex;gap:8px;flex-wrap:wrap}.content{padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px}.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:18px;box-shadow:0 10px 24px rgba(0,0,0,.04)}.k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}.v{font-family:'Playfair Display',serif;font-size:34px;color:var(--g2);line-height:1}.n{font-size:12px;color:var(--muted);margin-top:8px}.split{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:18px}.section{font-family:'Playfair Display',serif;font-size:24px;color:var(--g2);margin-bottom:12px}
table{width:100%;border-collapse:collapse}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);background:#faf7f0}.table{overflow:auto}.row{display:flex;gap:8px;flex-wrap:wrap}.row-between{display:flex;justify-content:space-between;gap:12px;align-items:center}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip,.badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}.chip{background:#f2e9d7;color:var(--g2)}.ok{background:#d8efe3;color:#16563c}.warn{background:#f7efd0;color:#775906}.info{background:#dbe7f6;color:#174d7b}.bad{background:#f4d8d8;color:#8d2323}.neutral{background:#ece4d7;color:#5a5247}
.mesas{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.mesa .num{font-family:'Playfair Display',serif;font-size:36px;color:var(--g2)}.mesa .url{font-size:12px;color:var(--muted);word-break:break-all;margin:10px 0}.mesa img{width:138px;height:138px;border-radius:12px;border:1px solid var(--line);background:#fff;display:block;margin:10px auto}.thumb{width:62px;height:42px;border-radius:10px;object-fit:cover;background:#e7dcc6}.item{display:flex;gap:12px;align-items:center}.item strong{display:block;color:var(--g2)}.item span{font-size:12px;color:var(--muted)}
.modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}.modalWrap.on{opacity:1;pointer-events:auto}.modal{width:min(560px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:18px;padding:22px;border:1px solid rgba(184,151,58,.2)}.modalHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}.modalHead h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--g2)}.close{background:none;border:none;font-size:28px;color:var(--muted);cursor:pointer}.toast{position:fixed;right:20px;bottom:20px;background:var(--g);color:#e7cf86;padding:12px 18px;border-radius:999px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}.toast.on{opacity:1;transform:none}.loading{min-height:240px;display:grid;place-items:center;color:var(--muted)}
@media (max-width:900px){.side{position:static;width:100%;height:auto}.main{margin-left:0}.split{grid-template-columns:1fr}}@media (max-width:640px){.content,.top{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<section class="login" id="loginPage"><div class="box"><div class="mark">Painel Administrativo</div><h1 class="title">Amaro<br>Café</h1><p class="sub">Área exclusiva do administrador. O cliente continua na rota própria do cardápio.</p><div class="field"><label>Email</label><input id="email" type="email" value="admin@amarocafe.com.br"></div><div class="field"><label>Senha</label><input id="senha" type="password" value="amaro@2024"></div><button class="btn primary" style="width:100%" onclick="login()">Entrar</button><div class="error" id="err"></div></div></section>
<section class="app" id="app"><aside class="side"><div class="head"><div class="logo">AMARO</div><small>Administração</small></div><nav class="nav" id="nav"><button class="on" onclick="go('dashboard')">Dashboard</button><button onclick="go('pedidos')">Pedidos</button><button onclick="go('cardapio')">Cardápio</button><button onclick="go('mesas')">Mesas e QR</button><button onclick="go('caixa')">Caixa</button><button onclick="go('estoque')">Estoque</button><button onclick="go('fiscal')">Fiscal</button></nav><div class="foot"><div id="user">Administrador</div><button class="btn secondary" style="width:100%;margin-top:10px" onclick="logout()">Sair</button></div></aside><main class="main"><header class="top"><div><h1 id="ttl">Dashboard</h1><p id="subttl">Visão geral da operação.</p></div><div class="actions" id="acts"></div></header><div class="content" id="content"><div class="loading">Carregando painel...</div></div></main></section>
<div class="modalWrap" id="modalWrap" onclick="outside(event)"><div class="modal" id="modal"></div></div><div class="toast" id="toast"></div>
<script src="../site-config.js"></script><script src="../app-config.js"></script><script src="../demo-data.js"></script><script>
const API=window.AMARO_CONFIG.apiBase,CFG=window.AMARO_CONFIG,DEMO=window.AMARO_DEMO,TK='amaro_token',DK='amaro_demo_mode';
const S={token:localStorage.getItem(TK)||'',demo:localStorage.getItem(DK)==='1',admin:null,page:'dashboard',demoState:null};
const $=id=>document.getElementById(id),esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}),today=()=>new Date().toISOString().slice(0,10);
const stamp=v=>{if(!v)return'-';const d=new Date(String(v).replace(' ','T'));return Number.isNaN(d)?v:d.toLocaleString('pt-BR')};
const badge=(s,t='')=>{const m={aguardando_pagamento:['warn','Aguardando pagamento'],confirmado:['info','Confirmado'],em_preparo:['info','Em preparo'],pronto:['ok','Pronto'],entregue:['ok','Entregue'],cancelado:['bad','Cancelado'],aberto:['ok','Aberto'],fechado:['neutral','Fechado'],registrado:['ok','Registrado']};const b=m[s]||['neutral',s||'-'];return `<span class="badge ${b[0]}">${esc(t||b[1])}</span>`};
function toast(t){$('toast').textContent=t;$('toast').classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('on'),2400)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function showModal(h){$('modal').innerHTML=h;$('modalWrap').classList.add('on')}function closeModal(){$('modalWrap').classList.remove('on');$('modal').innerHTML=''}function outside(e){if(e.target.id==='modalWrap')closeModal()}
function setTop(t,s,a=[]){$('ttl').textContent=t;$('subttl').textContent=s;$('acts').innerHTML=a.join('')}function loading(t='Carregando...'){$('content').innerHTML=`<div class="loading">${esc(t)}</div>`}
function demoState(){if(S.demoState)return S.demoState;S.demoState={admin:clone(DEMO.admin),pedidos:clone(DEMO.pedidosLista),mesas:clone(DEMO.mesas).map(m=>({...m,ativa:m.ativa==null?1:m.ativa})),pratos:clone(DEMO.pratos),categorias:clone(DEMO.categorias),caixas:clone(DEMO.caixaHistorico),lancamentos:clone(DEMO.caixaLancamentos),insumos:clone(DEMO.estoqueInsumos),fichas:clone(DEMO.estoqueFichas),movs:[],fiscalConfig:clone(DEMO.fiscalConfig),fiscalLanc:clone(DEMO.fiscalLancamentos)};return S.demoState}
function demoOpen(){return demoState().caixas.find(c=>c.status==='aberto')||null}function demoRecalc(id){const c=demoState().caixas.find(x=>x.id===id);if(!c)return null;const t={venda:0,despesa:0,sangria:0,suprimento:0,estorno:0};demoState().lancamentos.filter(x=>x.caixa_id===id).forEach(x=>t[x.tipo]=(t[x.tipo]||0)+Number(x.valor||0));c.totais=t;c.saldo_sistema_calculado=Number((Number(c.saldo_inicial||0)+t.venda+t.suprimento-t.despesa-t.sangria-t.estorno).toFixed(2));return c}
function demoDash(){const p=demoState().pedidos.filter(x=>['confirmado','em_preparo','pronto','entregue'].includes(x.status)),r={};p.forEach(o=>(o.itens||[]).forEach(i=>r[i.nome_prato]=(r[i.nome_prato]||0)+Number(i.quantidade||0)));const h=today(),ph=p.filter(x=>String(x.criado_em).startsWith(h)),tm=p.reduce((s,x)=>s+Number(x.total||0),0);return{resumo:{hoje:{valor:ph.reduce((s,x)=>s+Number(x.total||0),0),pedidos:ph.length},semana:{valor:tm,pedidos:p.length},mes:{valor:tm,pedidos:p.length},ticket_medio:p.length?tm/p.length:0},rankings:{pratos:Object.entries(r).map(([nome_prato,total_vendido])=>({nome_prato,total_vendido})).sort((a,b)=>b.total_vendido-a.total_vendido).slice(0,6)},pedidos_recentes:clone(demoState().pedidos).slice(0,8),operacao:{estoque:{ativos:demoState().insumos.filter(i=>i.ativo!==0).length,abaixo_minimo:demoState().insumos.filter(i=>i.ativo!==0&&Number(i.estoque_atual)<=Number(i.estoque_minimo)).length,zerados:demoState().insumos.filter(i=>i.ativo!==0&&Number(i.estoque_atual)<=0).length},caixa:demoOpen()?clone(demoRecalc(demoOpen().id)):null}}}
function useDemo(){if(!DEMO)throw new Error('Modo alternativo indisponível.');S.demo=true;localStorage.setItem(DK,'1');localStorage.removeItem(TK);S.admin=clone(demoState().admin);S.token='demo-token'}
function parseBody(body){if(!body)return{};if(body instanceof FormData){const x={};body.forEach((v,k)=>x[k]=v);return x}return clone(body)}function nextId(list){return list.length?Math.max(...list.map(i=>Number(i.id||0)))+1:1}
function demoApi(path,method='GET',body=null){const u=new URL(`https://x${path}`),r=u.pathname,p=r.split('/').filter(Boolean),b=parseBody(body),D=demoState();if(r==='/auth/login'&&method==='POST'){if(String(b.email||'').toLowerCase()!=='admin@amarocafe.com.br'||b.senha!=='amaro@2024')throw new Error('Credenciais inválidas.');return{token:'demo-token',admin:clone(D.admin)}}if(r==='/auth/me')return{admin:clone(D.admin)};if(r==='/dashboard')return demoDash();if(r==='/dashboard/mesas')return clone(D.mesas);if(p[0]==='dashboard'&&p[1]==='mesas'&&p[3]==='toggle'){const m=D.mesas.find(x=>String(x.numero)===p[2]);if(m)m.ativa=m.ativa?0:1;return{ok:true}}if(r.startsWith('/pedidos/admin/lista')){let a=clone(D.pedidos);const st=u.searchParams.get('status'),dt=u.searchParams.get('data'),ms=u.searchParams.get('mesa');if(st)a=a.filter(x=>x.status===st);if(dt)a=a.filter(x=>String(x.criado_em).startsWith(dt));if(ms)a=a.filter(x=>String(x.mesa_numero)===String(ms));return a}if(p[0]==='pedidos'&&p[1]==='admin'&&p[2]&&!p[3]){const o=D.pedidos.find(x=>String(x.id)===p[2]);if(!o)throw new Error('Pedido não encontrado.');return clone(o)}if(p[0]==='pedidos'&&p[1]==='admin'&&p[3]==='status'){const o=D.pedidos.find(x=>String(x.id)===p[2]);if(o)o.status=b.status;return{ok:true}}if(r==='/cardapio/admin/pratos')return clone(D.pratos);if(r==='/cardapio/admin/categorias')return clone(D.categorias);if(r==='/caixa/status')return{aberto:!!demoOpen(),caixa:demoOpen()?clone(demoRecalc(demoOpen().id)):null};if(r==='/caixa/historico'){D.caixas.forEach(c=>demoRecalc(c.id));return clone(D.caixas)}if(r==='/caixa/lancamentos'&&method==='GET'){const o=demoOpen();return clone(D.lancamentos.filter(x=>!o||x.caixa_id===o.id)).reverse()}if(r==='/caixa/abrir'){if(demoOpen())throw new Error('Já existe um caixa aberto.');D.caixas.unshift({id:nextId(D.caixas),status:'aberto',saldo_inicial:Number(b.saldo_inicial||0),aberto_em:new Date().toISOString().slice(0,19).replace('T',' '),totais:{venda:0,despesa:0,sangria:0,suprimento:0,estorno:0}});return{ok:true}}if(r==='/caixa/lancamentos'&&method==='POST'){const o=demoOpen();if(!o)throw new Error('Não há caixa aberto.');D.lancamentos.push({id:nextId(D.lancamentos),caixa_id:o.id,tipo:b.tipo,descricao:b.descricao||'',forma_pagamento:b.forma_pagamento||'caixa',valor:Number(b.valor||0),criado_em:new Date().toISOString().slice(0,19).replace('T',' ')});return{ok:true}}if(r==='/caixa/fechar'){const o=demoOpen();if(!o)throw new Error('Não há caixa aberto.');demoRecalc(o.id);o.status='fechado';o.saldo_final_informado=Number(b.saldo_final_informado||o.saldo_sistema_calculado);o.diferenca=Number((o.saldo_final_informado-o.saldo_sistema_calculado).toFixed(2));return{ok:true}}if(r==='/estoque/resumo')return{ativos:D.insumos.filter(i=>i.ativo!==0).length,abaixo_minimo:D.insumos.filter(i=>i.ativo!==0&&Number(i.estoque_atual)<=Number(i.estoque_minimo)).length,zerados:D.insumos.filter(i=>i.ativo!==0&&Number(i.estoque_atual)<=0).length};if(r==='/estoque/insumos')return clone(D.insumos);if(r==='/estoque/fichas')return clone(D.fichas);if(r==='/estoque/movimentos')return clone(D.movs).reverse();if(r==='/fiscal/config'&&method==='GET')return clone(D.fiscalConfig);if(r==='/fiscal/config'&&method==='PUT'){D.fiscalConfig={...D.fiscalConfig,...b,aliquota_estimada:Number(b.aliquota_estimada||0)};return{ok:true}}if(r.startsWith('/fiscal/resumo')){const R={documentos:D.fiscalLanc.length,faturamento_bruto:0,impostos_estimados:0,cancelados:0},G={};D.fiscalLanc.forEach(x=>{if(x.situacao!=='cancelado'){R.faturamento_bruto+=Number(x.base_calculo||0);R.impostos_estimados+=Number(x.valor_imposto||0)}else R.cancelados+=Number(x.base_calculo||0);const k=x.forma_pagamento||'nao informado';G[k]=G[k]||{forma_pagamento:k,quantidade:0,total:0};G[k].quantidade++;G[k].total+=Number(x.base_calculo||0)});return{resumo:R,por_pagamento:Object.values(G)}}if(r==='/fiscal/lancamentos')return clone(D.fiscalLanc);throw new Error('Recurso indisponível.')}
async function api(path,method='GET',body=null,auth=true){if(S.demo)return demoApi(path,method,body);const h={};let payload=body;if(auth&&S.token)h.Authorization=`Bearer ${S.token}`;if(body&&!(body instanceof FormData)){h['Content-Type']='application/json';payload=JSON.stringify(body)}try{const res=await fetch(`${API}${path}`,{method,headers:h,body:payload});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.erro||data.message||'Erro ao processar.');return data}catch(e){if(DEMO&&!S.demo){useDemo();return demoApi(path,method,body)}throw e}}
async function login(){try{const d=await api('/auth/login','POST',{email:$('email').value.trim(),senha:$('senha').value},false);S.token=d.token;S.admin=d.admin;if(!S.demo){localStorage.setItem(TK,S.token);localStorage.removeItem(DK)}showApp()}catch(e){$('err').textContent=e.message||'Falha no login.'}}
function logout(){localStorage.removeItem(TK);localStorage.removeItem(DK);location.reload()}
function showApp(){$('loginPage').style.display='none';$('app').style.display='block';$('user').textContent=S.admin?.nome||'Administrador';go(S.page||'dashboard')}
function setNav(p){const map={dashboard:'Dashboard',pedidos:'Pedidos',cardapio:'Cardápio',mesas:'Mesas e QR',caixa:'Caixa',estoque:'Estoque',fiscal:'Fiscal'};document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.textContent===map[p]))}
async function go(p){S.page=p;setNav(p);closeModal();loading();({dashboard:dash,pedidos:pedidos,cardapio:cardapio,mesas:mesas,caixa:caixa,estoque:estoque,fiscal:fiscal}[p]||dash)()}
async function dash(){setTop('Dashboard','Visão geral da operação.');const d=await api('/dashboard');$('content').innerHTML=`<div class="grid"><div class="card"><div class="k">Hoje</div><div class="v">${money(d.resumo?.hoje?.valor)}</div><div class="n">${d.resumo?.hoje?.pedidos||0} pedidos aprovados</div></div><div class="card"><div class="k">Semana</div><div class="v">${money(d.resumo?.semana?.valor)}</div><div class="n">${d.resumo?.semana?.pedidos||0} pedidos</div></div><div class="card"><div class="k">Mês</div><div class="v">${money(d.resumo?.mes?.valor)}</div><div class="n">${d.resumo?.mes?.pedidos||0} pedidos</div></div><div class="card"><div class="k">Ticket médio</div><div class="v">${money(d.resumo?.ticket_medio)}</div><div class="n">Média por pedido pago</div></div></div><div class="split"><section class="card"><div class="section">Operação</div><div class="row-between"><span>Estoque ativo</span><strong>${d.operacao?.estoque?.ativos??0}</strong></div><div class="row-between"><span>Abaixo do mínimo</span><strong>${d.operacao?.estoque?.abaixo_minimo??0}</strong></div><div class="row-between"><span>Zerados</span><strong>${d.operacao?.estoque?.zerados??0}</strong></div><div class="row-between"><span>Caixa atual</span><strong>${d.operacao?.caixa?money(d.operacao.caixa.saldo_sistema_calculado):'Fechado'}</strong></div></section><section class="card"><div class="section">Mais vendidos</div>${(d.rankings?.pratos||[]).slice(0,6).map((x,i)=>`<div class="row-between" style="margin-bottom:8px"><span>${i+1}. ${esc(x.nome_prato)}</span><strong>${x.total_vendido}</strong></div>`).join('')||'<div class="n">Sem vendas suficientes ainda.</div>'}</section></div><section class="card"><div class="section">Pedidos recentes</div><div class="table"><table><thead><tr><th>Pedido</th><th>Mesa</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Criado em</th></tr></thead><tbody>${(d.pedidos_recentes||[]).map(p=>`<tr><td>#${p.id}</td><td>${p.mesa_numero}</td><td>${money(p.total)}</td><td>${esc((p.forma_pagamento||'-').toUpperCase())}</td><td>${badge(p.status)}</td><td>${esc(stamp(p.criado_em))}</td></tr>`).join('')||'<tr><td colspan="6">Nenhum pedido encontrado.</td></tr>'}</tbody></table></div></section>`}
function filters(){const q=new URLSearchParams(),s=$('fltStatus')?.value||'',d=$('fltData')?.value||'',m=$('fltMesa')?.value||'';if(s)q.set('status',s);if(d)q.set('data',d);if(m)q.set('mesa',m);return q.toString()?`/pedidos/admin/lista?${q}`:'/pedidos/admin/lista'}
function nextBtns(p){const m={aguardando_pagamento:[['Confirmar','confirmado'],['Cancelar','cancelado',1]],confirmado:[['Em preparo','em_preparo'],['Cancelar','cancelado',1]],em_preparo:[['Pronto','pronto']],pronto:[['Entregue','entregue']]};return (m[p.status]||[]).map(x=>`<button class="btn ${x[2]?'danger':'soft'}" onclick="setStatus(${p.id},'${x[1]}')">${x[0]}</button>`).join('')}
async function pedidos(){setTop('Pedidos','Acompanhamento do salão e atualização rápida de status.',['<button class="btn secondary" onclick="pedidos()">Atualizar</button>']);const list=await api(filters());$('content').innerHTML=`<section class="card" style="margin-bottom:16px"><div class="section">Filtros</div><div class="row"><div class="field" style="flex:1 1 180px"><label>Status</label><select id="fltStatus"><option value="">Todos</option><option value="aguardando_pagamento">Aguardando pagamento</option><option value="confirmado">Confirmado</option><option value="em_preparo">Em preparo</option><option value="pronto">Pronto</option><option value="entregue">Entregue</option><option value="cancelado">Cancelado</option></select></div><div class="field" style="flex:1 1 180px"><label>Data</label><input id="fltData" type="date" value="${today()}"></div><div class="field" style="flex:1 1 180px"><label>Mesa</label><input id="fltMesa" type="number" min="1"></div></div><div class="row"><button class="btn primary" onclick="pedidos()">Aplicar filtros</button><button class="btn secondary" onclick="clearPedidos()">Limpar</button></div></section><section class="card"><div class="section">Lista de pedidos</div><div class="table"><table><thead><tr><th>Pedido</th><th>Mesa</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Criado em</th><th>Ações</th></tr></thead><tbody>${list.map(p=>`<tr><td>#${p.id}</td><td>${p.mesa_numero}</td><td>${money(p.total)}</td><td>${esc((p.forma_pagamento||'-').toUpperCase())}</td><td>${badge(p.status)}</td><td>${esc(stamp(p.criado_em))}</td><td><div class="row"><button class="btn secondary" onclick="viewPedido(${p.id})">Ver</button>${nextBtns(p)}</div></td></tr>`).join('')||'<tr><td colspan="7">Nenhum pedido encontrado.</td></tr>'}</tbody></table></div></section>`}
function clearPedidos(){$('fltStatus').value='';$('fltData').value='';$('fltMesa').value='';pedidos()}
async function viewPedido(id){const p=await api(`/pedidos/admin/${id}`);showModal(`<div class="modalHead"><div><h2>Pedido #${p.id}</h2><div class="sub">Mesa ${p.mesa_numero} · ${esc(stamp(p.criado_em))}</div></div><button class="close" onclick="closeModal()">×</button></div><div class="chips">${badge(p.status)}<span class="chip">Pagamento: ${esc((p.forma_pagamento||'-').toUpperCase())}</span><span class="chip">Total: ${money(p.total)}</span></div><div class="section" style="font-size:22px;margin-top:16px">Itens</div><div class="table"><table><thead><tr><th>Prato</th><th>Qtd.</th><th>Subtotal</th></tr></thead><tbody>${(p.itens||[]).map(i=>`<tr><td>${esc(i.nome_prato)}</td><td>${i.quantidade}</td><td>${money(i.subtotal)}</td></tr>`).join('')}</tbody></table></div><div class="section" style="font-size:22px;margin-top:16px">Observação</div><div class="n">${esc(p.observacao||'Sem observações.')}</div>`)}
async function setStatus(id,status){await api(`/pedidos/admin/${id}/status`,'PUT',{status});toast('Status atualizado.');pedidos()}
async function cardapio(){setTop('Cardápio','Lista administrativa de pratos e disponibilidade.');const [cats,pratos]=await Promise.all([api('/cardapio/admin/categorias'),api('/cardapio/admin/pratos')]);$('content').innerHTML=`<section class="card" style="margin-bottom:16px"><div class="section">Categorias</div><div class="chips">${cats.filter(c=>c.ativo!==0).map(c=>`<span class="chip">${esc(c.nome)}</span>`).join('')||'<span class="n">Nenhuma categoria encontrada.</span>'}</div></section><section class="card"><div class="section">Pratos</div><div class="table"><table><thead><tr><th>Prato</th><th>Categoria</th><th>Preço</th><th>Disponibilidade</th></tr></thead><tbody>${pratos.map(p=>`<tr><td><div class="item">${p.foto_url?`<img class="thumb" src="${esc(p.foto_url)}" alt="${esc(p.nome)}">`:'<div class="thumb"></div>'}<div><strong>${esc(p.nome)}</strong><span>${esc(p.descricao||'Sem descrição')}</span></div></div></td><td>${esc(p.categoria_nome||'-')}</td><td>${money(p.preco)}</td><td>${p.disponivel?badge('pronto','Disponível'):badge('cancelado','Indisponível')}</td></tr>`).join('')||'<tr><td colspan="4">Nenhum prato encontrado.</td></tr>'}</tbody></table></div></section>`}
async function mesas(){setTop('Mesas e QR','Links do cliente e QR Codes separados do painel administrativo.',['<button class="btn secondary" onclick="mesas()">Atualizar</button>']);const list=await api('/dashboard/mesas');$('content').innerHTML=`<div class="mesas">${list.map(m=>{const url=CFG.clienteUrl(m.numero),qr=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;return `<article class="card mesa"><div class="num">Mesa ${m.numero}</div><div style="margin-top:8px">${m.ativa?badge('pronto','Ativa'):badge('cancelado','Inativa')}</div><div class="url">${esc(url)}</div><img src="${qr}" alt="QR mesa ${m.numero}"><div class="row"><a class="btn secondary" target="_blank" rel="noreferrer" href="${url}">Abrir cliente</a><button class="btn primary" onclick="toggleMesa(${m.numero})">${m.ativa?'Desativar':'Ativar'}</button></div></article>`}).join('')}</div>`}
async function toggleMesa(n){await api(`/dashboard/mesas/${n}/toggle`,'PUT',{});toast('Mesa atualizada.');mesas()}
async function caixa(){setTop('Caixa','Controle de abertura, lançamentos e fechamento.',['<button class="btn secondary" onclick="caixa()">Atualizar</button>','<button class="btn primary" onclick="caixaAction()">Nova ação</button>']);const [st,hist,lan]=await Promise.all([api('/caixa/status'),api('/caixa/historico'),api('/caixa/lancamentos')]);const c=st.caixa;$('content').innerHTML=`<div class="grid"><div class="card"><div class="k">Status</div><div class="v" style="font-size:28px">${st.aberto?'Aberto':'Fechado'}</div><div class="n">${c?'Desde '+stamp(c.aberto_em):'Nenhum caixa aberto agora'}</div></div><div class="card"><div class="k">Saldo inicial</div><div class="v">${money(c?.saldo_inicial)}</div><div class="n">Valor de abertura</div></div><div class="card"><div class="k">Saldo calculado</div><div class="v">${money(c?.saldo_sistema_calculado)}</div><div class="n">Baseado nos lançamentos</div></div><div class="card"><div class="k">Vendas</div><div class="v">${money(c?.totais?.venda)}</div><div class="n">No caixa atual</div></div></div><div class="split"><section class="card"><div class="section">Caixa atual</div>${c?`<div class="row-between"><span>Despesas</span><strong>${money(c.totais?.despesa)}</strong></div><div class="row-between"><span>Sangrias</span><strong>${money(c.totais?.sangria)}</strong></div><div class="row-between"><span>Suprimentos</span><strong>${money(c.totais?.suprimento)}</strong></div><div class="row" style="margin-top:14px"><button class="btn secondary" onclick="modalLanc()">Lançamento</button><button class="btn danger" onclick="modalFechar(${c.saldo_sistema_calculado||0})">Fechar caixa</button></div>`:`<div class="n">Nenhum caixa aberto.</div><button class="btn primary" style="margin-top:12px" onclick="modalAbrir()">Abrir caixa</button>`}</section><section class="card"><div class="section">Histórico</div><div class="table"><table><thead><tr><th>ID</th><th>Status</th><th>Abertura</th><th>Saldo</th></tr></thead><tbody>${hist.map(x=>`<tr><td>#${x.id}</td><td>${badge(x.status)}</td><td>${esc(stamp(x.aberto_em))}</td><td>${money(x.saldo_sistema_calculado??x.saldo_sistema)}</td></tr>`).join('')||'<tr><td colspan="4">Sem histórico.</td></tr>'}</tbody></table></div></section></div><section class="card"><div class="section">Lançamentos do caixa aberto</div><div class="table"><table><thead><tr><th>Tipo</th><th>Descrição</th><th>Forma</th><th>Valor</th><th>Criado em</th></tr></thead><tbody>${lan.map(x=>`<tr><td>${esc(x.tipo)}</td><td>${esc(x.descricao||'-')}</td><td>${esc((x.forma_pagamento||'caixa').toUpperCase())}</td><td>${money(x.valor)}</td><td>${esc(stamp(x.criado_em))}</td></tr>`).join('')||'<tr><td colspan="5">Sem lançamentos.</td></tr>'}</tbody></table></div></section>`}
function caixaAction(){const hasOpen=$('content').textContent.includes('Nenhum caixa aberto');if(hasOpen)modalAbrir();else modalLanc()}
function modalAbrir(){showModal(`<div class="modalHead"><h2>Abrir caixa</h2><button class="close" onclick="closeModal()">×</button></div><form onsubmit="saveAbrir(event)"><div class="field"><label>Saldo inicial</label><input name="saldo_inicial" type="number" step="0.01" min="0" required></div><div class="field"><label>Observação</label><textarea name="observacao"></textarea></div><div class="row"><button class="btn primary" type="submit">Abrir caixa</button><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button></div></form>`)}
function modalLanc(){showModal(`<div class="modalHead"><h2>Novo lançamento</h2><button class="close" onclick="closeModal()">×</button></div><form onsubmit="saveLanc(event)"><div class="field"><label>Tipo</label><select name="tipo"><option value="despesa">Despesa</option><option value="sangria">Sangria</option><option value="suprimento">Suprimento</option></select></div><div class="field"><label>Valor</label><input name="valor" type="number" step="0.01" min="0.01" required></div><div class="field"><label>Forma de pagamento</label><select name="forma_pagamento"><option value="caixa">Caixa</option><option value="pix">PIX</option><option value="cartao">Cartão</option></select></div><div class="field"><label>Descrição</label><textarea name="descricao"></textarea></div><div class="row"><button class="btn primary" type="submit">Salvar</button><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button></div></form>`)}
function modalFechar(v){showModal(`<div class="modalHead"><h2>Fechar caixa</h2><button class="close" onclick="closeModal()">×</button></div><form onsubmit="saveFechar(event)"><div class="field"><label>Saldo final informado</label><input name="saldo_final_informado" type="number" step="0.01" min="0" value="${v}" required></div><div class="field"><label>Observação</label><textarea name="observacao"></textarea></div><div class="row"><button class="btn danger" type="submit">Fechar caixa</button><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button></div></form>`)}
async function saveAbrir(e){e.preventDefault();await api('/caixa/abrir','POST',Object.fromEntries(new FormData(e.target).entries()));toast('Caixa aberto.');closeModal();caixa()}
async function saveLanc(e){e.preventDefault();await api('/caixa/lancamentos','POST',Object.fromEntries(new FormData(e.target).entries()));toast('Lançamento salvo.');closeModal();caixa()}
async function saveFechar(e){e.preventDefault();await api('/caixa/fechar','POST',Object.fromEntries(new FormData(e.target).entries()));toast('Caixa fechado.');closeModal();caixa()}
async function estoque(){setTop('Estoque','Visão de insumos, fichas técnicas e movimentações.');const [r,i,f,m]=await Promise.all([api('/estoque/resumo'),api('/estoque/insumos'),api('/estoque/fichas'),api('/estoque/movimentos')]);const fr=Object.values(f.reduce((a,x)=>{a[x.prato_id]=a[x.prato_id]||{nome:x.prato_nome,total:0};if(x.insumo_id)a[x.prato_id].total++;return a},{}));$('content').innerHTML=`<div class="grid"><div class="card"><div class="k">Ativos</div><div class="v">${r.ativos}</div><div class="n">Insumos em uso</div></div><div class="card"><div class="k">Abaixo do mínimo</div><div class="v">${r.abaixo_minimo}</div><div class="n">Exigem reposição</div></div><div class="card"><div class="k">Zerados</div><div class="v">${r.zerados}</div><div class="n">Sem saldo</div></div><div class="card"><div class="k">Fichas técnicas</div><div class="v">${fr.length}</div><div class="n">Pratos com consumo mapeado</div></div></div><div class="split"><section class="card"><div class="section">Insumos</div><div class="table"><table><thead><tr><th>Nome</th><th>Categoria</th><th>Estoque</th><th>Mínimo</th><th>Custo</th></tr></thead><tbody>${i.map(x=>`<tr><td>${esc(x.nome)}</td><td>${esc(x.categoria||'-')}</td><td>${esc(x.estoque_atual)} ${esc(x.unidade)}</td><td>${esc(x.estoque_minimo)} ${esc(x.unidade)}</td><td>${money(x.custo_medio)}</td></tr>`).join('')||'<tr><td colspan="5">Nenhum insumo encontrado.</td></tr>'}</tbody></table></div></section><section class="card"><div class="section">Fichas técnicas</div>${fr.map(x=>`<div class="row-between" style="margin-bottom:8px"><span>${esc(x.nome)}</span><span class="chip">${x.total} itens</span></div>`).join('')||'<div class="n">Nenhuma ficha cadastrada.</div>'}</section></div><section class="card"><div class="section">Últimas movimentações</div><div class="table"><table><thead><tr><th>Insumo</th><th>Tipo</th><th>Quantidade</th><th>Observação</th><th>Criado em</th></tr></thead><tbody>${m.map(x=>`<tr><td>${esc(x.insumo_nome||'-')}</td><td>${esc(x.tipo)}</td><td>${esc(x.quantidade)} ${esc(x.unidade||'')}</td><td>${esc(x.observacao||'-')}</td><td>${esc(stamp(x.criado_em))}</td></tr>`).join('')||'<tr><td colspan="5">Nenhuma movimentação registrada.</td></tr>'}</tbody></table></div></section>`}
async function fiscal(){setTop('Fiscal','Configuração fiscal gerencial e histórico de lançamentos.',['<button class="btn secondary" onclick="fiscal()">Atualizar</button>']);const [c,r,l]=await Promise.all([api('/fiscal/config'),api(`/fiscal/resumo?data_inicial=${today()}`),api('/fiscal/lancamentos')]);$('content').innerHTML=`<div class="grid"><div class="card"><div class="k">Documentos</div><div class="v">${r.resumo?.documentos||0}</div><div class="n">No período consultado</div></div><div class="card"><div class="k">Faturamento bruto</div><div class="v">${money(r.resumo?.faturamento_bruto)}</div><div class="n">Base gerencial</div></div><div class="card"><div class="k">Impostos estimados</div><div class="v">${money(r.resumo?.impostos_estimados)}</div><div class="n">Cálculo estimado</div></div><div class="card"><div class="k">Cancelados</div><div class="v">${money(r.resumo?.cancelados)}</div><div class="n">Valor cancelado</div></div></div><div class="split"><section class="card"><div class="section">Configuração fiscal</div><form onsubmit="saveFiscal(event)"><div class="field"><label>Razão social</label><input name="razao_social" value="${esc(c?.razao_social||'')}"></div><div class="field"><label>CNPJ</label><input name="cnpj" value="${esc(c?.cnpj||'')}"></div><div class="field"><label>Regime tributário</label><input name="regime_tributario" value="${esc(c?.regime_tributario||'Simples Nacional')}"></div><div class="field"><label>Alíquota estimada (%)</label><input name="aliquota_estimada" type="number" step="0.01" min="0" value="${esc(c?.aliquota_estimada||0)}"></div><div class="field"><label>Ambiente</label><select name="ambiente"><option value="gerencial">Gerencial</option><option value="homologacao">Homologação</option><option value="producao">Produção</option></select></div><button class="btn primary" type="submit">Salvar configuração</button><div class="n" style="margin-top:10px">Este módulo segue gerencial até integrar emissão fiscal oficial.</div></form></section><section class="card"><div class="section">Por forma de pagamento</div>${(r.por_pagamento||[]).map(x=>`<div class="row-between" style="margin-bottom:8px"><span>${esc((x.forma_pagamento||'-').toUpperCase())}</span><strong>${money(x.total)}</strong></div>`).join('')||'<div class="n">Sem lançamentos para o período.</div>'}</section></div><section class="card"><div class="section">Lançamentos fiscais</div><div class="table"><table><thead><tr><th>Documento</th><th>Mesa</th><th>Forma</th><th>Base</th><th>Imposto</th><th>Situação</th><th>Criado em</th></tr></thead><tbody>${l.map(x=>`<tr><td>${esc(x.documento_numero)}</td><td>${esc(x.mesa_numero)}</td><td>${esc((x.forma_pagamento||'-').toUpperCase())}</td><td>${money(x.base_calculo)}</td><td>${money(x.valor_imposto)}</td><td>${badge(x.situacao)}</td><td>${esc(stamp(x.criado_em))}</td></tr>`).join('')||'<tr><td colspan="7">Nenhum lançamento encontrado.</td></tr>'}</tbody></table></div></section>`;const sel=document.querySelector('select[name="ambiente"]');if(sel)sel.value=c?.ambiente||'gerencial'}
async function saveFiscal(e){e.preventDefault();await api('/fiscal/config','PUT',Object.fromEntries(new FormData(e.target).entries()));toast('Configuração fiscal salva.');fiscal()}
async function boot(){if(!S.token&&!S.demo)return;if(S.demo){useDemo();showApp();return}try{const d=await api('/auth/me','GET',null,true);S.admin=d.admin;showApp()}catch{localStorage.removeItem(TK);if(DEMO){useDemo();showApp()}}}
window.addEventListener('load',boot);
</script>
</body>
</html>
