<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Amaro Café - Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#b8973a;
  --gold-2:#d4af5a;
  --green-1:#1a2118;
  --green-2:#2c3b2a;
  --cream:#f5f0e6;
  --cream-2:#ede4d0;
  --text:#1a1a1a;
  --muted:#777;
  --success:#2d6a4f;
  --danger:#c53030;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--text)}
.hero{background:var(--green-1);color:#fff;padding:52px 20px 38px;text-align:center;position:relative;overflow:hidden}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.hero::before{width:520px;height:520px;border:1px solid rgba(184,151,58,.12)}
.hero::after{width:320px;height:320px;border:1px solid rgba(184,151,58,.22)}
.hero-inner{position:relative;z-index:2}
.hero-mark{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(38px,10vw,64px);line-height:.94;font-weight:900}
.hero-title em{font-style:italic;color:var(--gold-2)}
.mesa-box{display:inline-flex;gap:8px;align-items:center;margin-top:16px;padding:7px 16px;border:1px solid rgba(184,151,58,.35);border-radius:3px}
.mesa-box span{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
.mesa-box strong{font-size:14px}
.cat-nav{position:sticky;top:0;z-index:20;background:var(--green-1);border-bottom:1px solid rgba(184,151,58,.18);overflow-x:auto}
.cat-nav::-webkit-scrollbar{display:none}
.cat-nav-inner{display:flex;gap:4px;min-width:max-content;max-width:980px;margin:0 auto;padding:0 12px}
.cat-btn{background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.45);cursor:pointer;font-size:10px;font-weight:700;letter-spacing:2px;padding:15px 14px;text-transform:uppercase;white-space:nowrap}
.cat-btn:hover,.cat-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.main{max-width:980px;margin:0 auto;padding:0 16px 120px}
.section{padding-top:52px}
.section-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:24px}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gold),transparent);margin-bottom:4px}
.section-tag{display:block;color:var(--gold);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,36px);font-weight:700;color:var(--green-2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.drink-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05);display:flex;flex-direction:column;cursor:pointer;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.card.off{opacity:.55;pointer-events:none}
.card-media{height:180px;background:linear-gradient(135deg,var(--green-1),var(--green-2));position:relative}
.card-media img{width:100%;height:100%;object-fit:cover;display:block}
.card-media-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;color:#fff}
.card-chip{position:absolute;left:10px;top:10px;padding:4px 8px;border:1px solid rgba(184,151,58,.3);background:rgba(26,33,24,.86);color:var(--gold);font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.card-body{padding:14px 16px 16px;display:flex;flex:1;flex-direction:column}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--green-2);margin-bottom:6px}
.card-desc{color:var(--muted);font-size:12px;line-height:1.6;flex:1;margin-bottom:14px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-price{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--green-2)}
.card-price small{font-family:'Montserrat',sans-serif;font-size:10px;color:var(--muted);font-weight:500}
.btn-round{width:36px;height:36px;border:none;border-radius:50%;background:var(--green-1);color:#fff;cursor:pointer;font-size:18px;line-height:1}
.drink-card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:8px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.drink-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.08)}
.drink-icon{width:42px;height:42px;border-radius:50%;background:var(--green-1);color:var(--gold-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-transform:uppercase}
.drink-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--green-2)}
.drink-price{font-size:12px;font-weight:700;color:var(--gold)}
.fab{position:fixed;right:20px;bottom:24px;z-index:50;display:flex;align-items:center;gap:10px;padding:14px 20px;border:1px solid rgba(184,151,58,.4);border-radius:999px;background:var(--green-1);box-shadow:0 8px 30px rgba(0,0,0,.25);color:#fff;cursor:pointer}
.fab.hidden{display:none}
.fab-count{width:22px;height:22px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.fab-total{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;left:0;right:0;bottom:0;z-index:60;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s ease;max-height:90vh;display:flex;flex-direction:column}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:42px;height:4px;border-radius:999px;background:#ddd;margin:12px auto 2px}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--cream-2)}
.drawer-head h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--green-2)}
.drawer-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer}
.drawer-body{padding:14px 20px;overflow:auto;flex:1}
.cart-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--cream-2)}
.cart-item:last-child{border-bottom:none}
.cart-thumb{width:56px;height:56px;border-radius:8px;background:var(--cream-2);object-fit:cover}
.cart-info{flex:1}
.cart-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--green-2)}
.cart-price{font-size:12px;color:var(--muted);margin-top:2px}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:28px;height:28px;border-radius:50%;border:1px solid var(--cream-2);background:none;cursor:pointer;font-size:16px}
.qty span{min-width:20px;text-align:center;font-weight:700}
.cart-subtotal{min-width:72px;text-align:right;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green-2)}
.empty{text-align:center;color:var(--muted);padding:36px 10px}
.drawer-foot{padding:16px 20px;border-top:1px solid var(--cream-2)}
.obs{width:100%;border:1px solid var(--cream-2);border-radius:8px;background:var(--cream);padding:10px 12px;font:inherit;font-size:12px;resize:none;margin-bottom:12px}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-row span{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.total-row strong{font-family:'Playfair Display',serif;font-size:28px;color:var(--green-2)}
.btn-main,.btn-alt{width:100%;border:none;border-radius:8px;padding:14px 16px;cursor:pointer}
.btn-main{background:var(--green-1);color:var(--gold-2);font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-alt{margin-top:8px;background:none;border:1px solid var(--cream-2);color:var(--muted);font-size:13px}
.modal-wrap{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-wrap.open{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:440px;max-height:90vh;overflow:auto;background:#fff;border-radius:12px;padding:28px}
.modal h3{font-family:'Playfair Display',serif;font-size:24px;color:var(--green-2);margin-bottom:6px}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:20px;letter-spacing:normal;text-transform:none}
.pay-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pay-btn{border:2px solid var(--cream-2);border-radius:10px;background:none;padding:16px 12px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green-2)}
.pix-box{background:var(--cream);border-radius:10px;padding:18px;text-align:center}
.pix-box .value{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--green-2);margin-bottom:12px}
.pix-box code{display:block;background:#fff;border:1px dashed var(--gold);border-radius:8px;padding:12px;text-align:left;word-break:break-all;color:var(--muted);font-size:11px;margin-bottom:10px}
.success{text-align:center;padding:10px 0}
.success h4{font-family:'Playfair Display',serif;font-size:26px;color:var(--success);margin-bottom:8px}
.success p{font-size:13px;color:var(--muted);line-height:1.7}
.success .order{display:inline-block;margin:14px 0;padding:8px 18px;border-radius:6px;background:var(--green-1);color:var(--gold-2);font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:var(--green-1);color:var(--gold-2);padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:12px;color:var(--muted)}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid rgba(184,151,58,.2);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .drink-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-inner">
    <div class="hero-mark">Cardápio Digital</div>
    <h1 class="hero-title">Amaro<br><em>Café</em></h1>
    <div class="mesa-box">
      <span>Mesa</span>
      <strong id="mesaNum">1</strong>
    </div>
  </div>
</header>

<nav class="cat-nav">
  <div class="cat-nav-inner" id="catNav"></div>
</nav>

<main class="main" id="mainContent">
  <div class="loading">
    <div class="spin"></div>
    <p>Carregando cardápio...</p>
  </div>
</main>

<button class="fab hidden" id="cartFab" type="button">
  <span class="fab-count" id="cartCount">0</span>
  <span>Pedido</span>
  <strong class="fab-total" id="cartTotal">R$ 0,00</strong>
</button>

<div class="overlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <h3>Seu Pedido</h3>
    <button class="drawer-close" id="drawerClose" type="button">x</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot">
    <textarea class="obs" id="obsGeral" rows="2" placeholder="Alguma observação geral?"></textarea>
    <div class="total-row">
      <span>Total</span>
      <strong id="drawerTotal">R$ 0,00</strong>
    </div>
    <button class="btn-main" id="btnPedir" type="button">Ir para pagamento</button>
  </div>
</aside>

<div class="modal-wrap" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="../site-config.js"></script>
<script src="../app-config.js"></script>
<script src="../demo-data.js"></script>
<script>
const CONFIG = window.AMARO_CONFIG;
const API = CONFIG.apiBase;
const DEMO = window.AMARO_DEMO;

let cardapio = [];
let carrinho = [];
let mesaNumero = 1;
let pedidoId = null;
let demoMode = false;

const urlParams = new URLSearchParams(window.location.search);
mesaNumero = parseInt(urlParams.get('mesa'), 10) || 1;
document.getElementById('mesaNum').textContent = mesaNumero;

const fmt = (value) => 'R$ ' + Number(value || 0).toFixed(2).replace('.', ',');
const toast = (message, duration = 2500) => {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
};

function ativarModoDemo() {
  demoMode = true;
}

function drinkLabel(nome) {
  const text = String(nome || '').toUpperCase();
  if (text.includes('H2O')) return 'H2O';
  if (text.includes('GUARANA')) return 'GUA';
  if (text.includes('ZERO')) return 'ZERO';
  if (text.includes('COCA')) return 'COKE';
  return 'BAR';
}

async function carregarCardapio() {
  try {
    const response = await fetch(`${API}/cardapio`);
    if (!response.ok) throw new Error('API indisponível');
    cardapio = await response.json();
    renderCardapio();
  } catch (error) {
    if (DEMO) {
      ativarModoDemo();
      cardapio = DEMO.cardapio;
      renderCardapio();
      return;
    }
    document.getElementById('mainContent').innerHTML = '<div class="loading"><p>Erro ao carregar o cardápio.</p></div>';
  }
}

function renderCardapio() {
  const nav = document.getElementById('catNav');
  const main = document.getElementById('mainContent');
  nav.innerHTML = '';
  main.innerHTML = '';

  const sectionTags = {
    Entradinhas: 'Para começar',
    Executivos: 'Pratos principais',
    Tapiocas: 'Nordeste na mesa',
    Cuscuz: 'Tradição nordestina',
    Salgados: 'Petiscos',
    Bebidas: 'Para acompanhar'
  };

  cardapio.forEach((categoria, index) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (index === 0 ? ' on' : '');
    btn.textContent = categoria.nome;
    btn.onclick = () => document.getElementById(`sec-${categoria.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    nav.appendChild(btn);

    const section = document.createElement('section');
    section.className = 'section';
    section.id = `sec-${categoria.id}`;
    section.innerHTML = `
      <div class="section-head">
        <div>
          <span class="section-tag">${sectionTags[categoria.nome] || ''}</span>
          <h2 class="section-title">${categoria.nome}</h2>
        </div>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = categoria.nome === 'Bebidas' ? 'drink-grid' : 'grid';
    categoria.pratos.forEach((prato) => {
      grid.appendChild(categoria.nome === 'Bebidas' ? criarDrinkCard(prato) : criarFoodCard(prato, categoria.nome));
    });
    section.appendChild(grid);
    main.appendChild(section);
  });

  const sections = document.querySelectorAll('.section');
  const buttons = document.querySelectorAll('.cat-btn');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id.replace('sec-', '');
      buttons.forEach((button, index) => button.classList.toggle('on', String(cardapio[index]?.id) === id));
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  sections.forEach((section) => observer.observe(section));
}

function criarFoodCard(prato, categoriaNome) {
  const card = document.createElement('article');
  card.className = 'card' + (prato.disponivel ? '' : ' off');
  card.innerHTML = `
    <div class="card-media">
      ${prato.foto_url ? `<img src="${prato.foto_url}" alt="${prato.nome}" loading="lazy">` : '<div class="card-media-placeholder">AMARO</div>'}
      <span class="card-chip">${categoriaNome}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${prato.nome}</div>
      <div class="card-desc">${prato.descricao || ''}</div>
      <div class="card-foot">
        <div class="card-price"><small>R$</small> ${Number(prato.preco).toFixed(2).replace('.', ',')}</div>
        <button class="btn-round" type="button">+</button>
      </div>
    </div>
  `;
  card.querySelector('.btn-round').onclick = (event) => {
    event.stopPropagation();
    adicionarAoCarrinho(prato);
  };
  card.onclick = () => adicionarAoCarrinho(prato);
  return card;
}

function criarDrinkCard(prato) {
  const card = document.createElement('article');
  card.className = 'drink-card';
  card.innerHTML = `
    <div class="drink-icon">${drinkLabel(prato.nome)}</div>
    <div>
      <div class="drink-name">${prato.nome}</div>
      <div class="drink-price">${fmt(prato.preco)}</div>
    </div>
    <button class="btn-round" type="button">+</button>
  `;
  card.querySelector('.btn-round').onclick = (event) => {
    event.stopPropagation();
    adicionarAoCarrinho(prato);
  };
  card.onclick = () => adicionarAoCarrinho(prato);
  return card;
}

function adicionarAoCarrinho(prato) {
  const index = carrinho.findIndex((item) => item.prato_id === prato.id);
  if (index >= 0) {
    carrinho[index].quantidade += 1;
    carrinho[index].subtotal = carrinho[index].quantidade * carrinho[index].preco;
  } else {
    carrinho.push({
      prato_id: prato.id,
      nome: prato.nome,
      preco: prato.preco,
      quantidade: 1,
      subtotal: prato.preco,
      foto: prato.foto_url || ''
    });
  }
  atualizarFab();
  toast(`${prato.nome} adicionado`);
}

function removerDoCarrinho(pratoId) {
  const index = carrinho.findIndex((item) => item.prato_id === pratoId);
  if (index < 0) return;
  if (carrinho[index].quantidade > 1) {
    carrinho[index].quantidade -= 1;
    carrinho[index].subtotal = carrinho[index].quantidade * carrinho[index].preco;
  } else {
    carrinho.splice(index, 1);
  }
  atualizarFab();
  renderDrawer();
}

function totalCarrinho() {
  return carrinho.reduce((sum, item) => sum + item.subtotal, 0);
}

function atualizarFab() {
  const total = totalCarrinho();
  const quantidade = carrinho.reduce((sum, item) => sum + item.quantidade, 0);
  const fab = document.getElementById('cartFab');
  if (quantidade === 0) {
    fab.classList.add('hidden');
    return;
  }
  fab.classList.remove('hidden');
  document.getElementById('cartCount').textContent = quantidade;
  document.getElementById('cartTotal').textContent = fmt(total);
}

function abrirDrawer() {
  renderDrawer();
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function fecharDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawer() {
  const body = document.getElementById('drawerBody');
  document.getElementById('drawerTotal').textContent = fmt(totalCarrinho());

  if (!carrinho.length) {
    body.innerHTML = '<div class="empty">Seu carrinho está vazio.</div>';
    return;
  }

  body.innerHTML = carrinho.map((item) => `
    <div class="cart-item">
      ${item.foto ? `<img class="cart-thumb" src="${item.foto}" alt="${item.nome}">` : '<div class="cart-thumb"></div>'}
      <div class="cart-info">
        <div class="cart-name">${item.nome}</div>
        <div class="cart-price">${fmt(item.preco)} por unidade</div>
      </div>
      <div class="qty">
        <button type="button" onclick="removerDoCarrinho(${item.prato_id})">-</button>
        <span>${item.quantidade}</span>
        <button type="button" onclick="adicionarAoCarrinho({id:${item.prato_id},nome:${JSON.stringify(item.nome)},preco:${item.preco},foto_url:${JSON.stringify(item.foto)},disponivel:1})">+</button>
      </div>
      <div class="cart-subtotal">${fmt(item.subtotal)}</div>
    </div>
  `).join('');
}

async function criarPedido(observacao) {
  if (demoMode) {
    pedidoId = Math.floor(1000 + Math.random() * 9000);
    abrirPagamento(totalCarrinho());
    return;
  }

  try {
    const response = await fetch(`${API}/pedidos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesa_numero: mesaNumero,
        itens: carrinho.map((item) => ({ prato_id: item.prato_id, quantidade: item.quantidade })),
        observacao
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.erro || 'Erro ao criar pedido');
    pedidoId = data.pedido_id;
    abrirPagamento(data.total);
  } catch (error) {
    toast(error.message || 'Erro ao criar pedido', 3500);
  }
}

function abrirPagamento(total) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  overlay.classList.add('open');
  content.innerHTML = `
    <h3>Pagamento</h3>
    <div class="sub">Pedido #${pedidoId} - Mesa ${mesaNumero}</div>
    <div style="font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--green-2);margin-bottom:18px">${fmt(total)}</div>
    <div class="pay-options">
      <button class="pay-btn" type="button" onclick="selecionarPagamento('pix', ${total})">PIX</button>
      <button class="pay-btn" type="button" onclick="selecionarPagamento('cartao', ${total})">Cartao</button>
    </div>
    <button class="btn-main" type="button" onclick="simularPagamento('demo')">Simular pagamento</button>
    <button class="btn-alt" type="button" onclick="fecharModal()">Cancelar</button>
  `;
}

async function selecionarPagamento(metodo, total) {
  if (demoMode) {
    if (metodo === 'pix') {
      const codigo = `AMARO-${pedidoId}-${mesaNumero}`;
      document.getElementById('modalContent').innerHTML = `
        <h3>Pague com PIX</h3>
        <div class="sub">Pedido #${pedidoId} - ${fmt(total)}</div>
        <div class="pix-box">
          <div class="value">${fmt(total)}</div>
          <code>${codigo}</code>
          <button class="btn-main" type="button" onclick="copiarPix(${JSON.stringify(codigo)})">Copiar codigo PIX</button>
        </div>
        <button class="btn-main" type="button" style="margin-top:12px" onclick="simularPagamento('pix')">Confirmar pagamento</button>
        <button class="btn-alt" type="button" onclick="abrirPagamento(${total})">Voltar</button>
      `;
      return;
    }
    simularPagamento('cartao');
    return;
  }

  if (metodo === 'pix') {
    const content = document.getElementById('modalContent');
    content.innerHTML = '<div class="loading"><div class="spin"></div><p>Gerando PIX...</p></div>';
    try {
      const response = await fetch(`${API}/pagamento/pix`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pedido_id: pedidoId })
      });
      const data = await response.json();
      content.innerHTML = `
        <h3>Pague com PIX</h3>
        <div class="sub">Pedido #${pedidoId} - ${fmt(total)}</div>
        <div class="pix-box">
          <div class="value">${fmt(total)}</div>
          ${data.qr_code_base64 ? `<img src="data:image/png;base64,${data.qr_code_base64}" alt="PIX" style="width:180px;height:180px;display:block;margin:0 auto 12px;border-radius:8px">` : ''}
          <code>${data.pix_copia_cola || 'Código PIX indisponível'}</code>
          <button class="btn-main" type="button" onclick="copiarPix(${JSON.stringify(data.pix_copia_cola || '')})">Copiar codigo PIX</button>
        </div>
        <button class="btn-main" type="button" style="margin-top:12px" onclick="simularPagamento('pix')">Confirmar pagamento</button>
        <button class="btn-alt" type="button" onclick="abrirPagamento(${total})">Voltar</button>
      `;
    } catch (error) {
      toast('Erro ao gerar PIX', 3000);
    }
    return;
  }

  simularPagamento('cartao');
}

function copiarPix(codigo) {
  navigator.clipboard.writeText(codigo || '').then(() => toast('Código PIX copiado'));
}

async function simularPagamento(metodo) {
  const content = document.getElementById('modalContent');
  content.innerHTML = '<div class="loading"><div class="spin"></div><p>Processando...</p></div>';

  if (demoMode) {
    setTimeout(exibirSucesso, 700);
    return;
  }

  try {
    await fetch(`${API}/pagamento/simular`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pedido_id: pedidoId, metodo })
    });
    exibirSucesso();
  } catch (error) {
    toast('Erro ao confirmar pagamento', 3000);
  }
}

function exibirSucesso() {
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="success">
      <h4>Pedido confirmado</h4>
      <div class="order">#${pedidoId}</div>
      <p>Seu pedido foi recebido com sucesso.<br>Em breve ele chegará à sua mesa.</p>
      <button class="btn-main" type="button" style="margin-top:20px" onclick="location.reload()">Fazer novo pedido</button>
    </div>
  `;
  carrinho = [];
  atualizarFab();
}

function fecharModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('cartFab').onclick = abrirDrawer;
document.getElementById('drawerOverlay').onclick = fecharDrawer;
document.getElementById('drawerClose').onclick = fecharDrawer;
document.getElementById('btnPedir').onclick = async () => {
  if (!carrinho.length) return;
  fecharDrawer();
  await criarPedido(document.getElementById('obsGeral').value);
};
document.getElementById('modalOverlay').addEventListener('click', (event) => {
  if (event.target === document.getElementById('modalOverlay')) fecharModal();
});

carregarCardapio();
</script>
</body>
</html>
